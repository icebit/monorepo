<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#fafaf9"/>
  <g transform="translate(256, 240)">
    <!-- Main carapace (prosoma) -->
    <ellipse cx="0" cy="-20" rx="140" ry="100" fill="#1c1917"/>
    <!-- Ridge line down the center -->
    <line x1="0" y1="-110" x2="0" y2="60" stroke="#78716c" stroke-width="3" stroke-linecap="round"/>
    <!-- Lateral ridges -->
    <line x1="-40" y1="-90" x2="-80" y2="30" stroke="#78716c" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="40" y1="-90" x2="80" y2="30" stroke="#78716c" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Eyes -->
    <circle cx="-50" cy="-60" r="8" fill="#78716c"/>
    <circle cx="50" cy="-60" r="8" fill="#78716c"/>
    <!-- Opisthosoma (abdomen section) -->
    <path d="M-100,50 Q-120,80 -90,120 L0,100 L90,120 Q120,80 100,50 Z" fill="#292524"/>
    <!-- Side spines -->
    <line x1="-105" y1="60" x2="-125" y2="55" stroke="#1c1917" stroke-width="4" stroke-linecap="round"/>
    <line x1="-110" y1="80" x2="-130" y2="78" stroke="#1c1917" stroke-width="4" stroke-linecap="round"/>
    <line x1="-100" y1="100" x2="-120" y2="102" stroke="#1c1917" stroke-width="3" stroke-linecap="round"/>
    <line x1="105" y1="60" x2="125" y2="55" stroke="#1c1917" stroke-width="4" stroke-linecap="round"/>
    <line x1="110" y1="80" x2="130" y2="78" stroke="#1c1917" stroke-width="4" stroke-linecap="round"/>
    <line x1="100" y1="100" x2="120" y2="102" stroke="#1c1917" stroke-width="3" stroke-linecap="round"/>
    <!-- Telson (tail spine) -->
    <line x1="0" y1="100" x2="0" y2="210" stroke="#1c1917" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
